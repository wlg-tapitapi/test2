<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAPI TAPI QUIZ SHOW</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><ellipse cx='22' cy='26' rx='16' ry='11' fill='%2367e8f9' opacity='.9' transform='rotate(-30 22 26)'/><ellipse cx='42' cy='26' rx='16' ry='11' fill='%2367e8f9' opacity='.9' transform='rotate(30 42 26)'/><ellipse cx='22' cy='40' rx='11' ry='8' fill='%2322d3ee' opacity='.85' transform='rotate(20 22 40)'/><ellipse cx='42' cy='40' rx='11' ry='8' fill='%2322d3ee' opacity='.85' transform='rotate(-20 42 40)'/><ellipse cx='32' cy='32' rx='4' ry='12' fill='%230e7490'/><circle cx='30' cy='20' r='2' fill='%230e7490'/><circle cx='34' cy='20' r='2' fill='%230e7490'/><line x1='30' y1='20' x2='24' y2='14' stroke='%230e7490' stroke-width='1.5' stroke-linecap='round'/><line x1='34' y1='20' x2='40' y2='14' stroke='%230e7490' stroke-width='1.5' stroke-linecap='round'/><circle cx='24' cy='14' r='1.5' fill='%230e7490'/><circle cx='40' cy='14' r='1.5' fill='%230e7490'/></svg>">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, push, set, onDisconnect } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ====================================================
  // ★ ここを自分のFirebase設定に書き換えてください ★
  // ====================================================const firebaseConfig = {
  apiKey: "AIzaSyAymLE_WA4c8i71_T93qS3rYOvO_K4UhBI",
  authDomain: "no-same-answer.firebaseapp.com",
  databaseURL: "https://no-same-answer-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "no-same-answer",
  storageBucket: "no-same-answer.firebasestorage.app",
  messagingSenderId: "375361422194",
  appId: "1:375361422194:web:ada999458ed68e30c753eb"
};
  // ====================================================

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  // ── presence登録（ページを開いたら+1、閉じたら-1） ──
  const presenceRef = push(ref(db, 'presence'));
  set(presenceRef, { joined: Date.now() });
  onDisconnect(presenceRef).remove();

  let playerName = '';
  let hasAnswered = false;

  const nameScreen   = document.getElementById('nameScreen');
  const gameScreen   = document.getElementById('gameScreen');
  const doneScreen   = document.getElementById('doneScreen');
  const nameInput    = document.getElementById('nameInput');
  const joinBtn      = document.getElementById('joinBtn');
  const questionText = document.getElementById('questionText');
  const waitBox      = document.getElementById('waitBox');
  const answerInput  = document.getElementById('answerInput');
  const submitBtn    = document.getElementById('submitBtn');
  const charCount    = document.getElementById('charCount');
  const doneNameSpan = document.getElementById('doneName');
  const playerLabel  = document.getElementById('playerLabel');

  // 参加ボタン
  joinBtn.addEventListener('click', () => {
    const n = nameInput.value.trim();
    if (!n) { shakeEl(nameInput); return; }
    playerName = n;
    playerLabel.textContent = '👤 ' + playerName;
    show(gameScreen); hide(nameScreen);
    listenQuestion();
  });
  nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') joinBtn.click(); });

  // 質問リッスン
  function listenQuestion() {
    onValue(ref(db, 'session/question'), snap => {
      const q = snap.val();
      if (q) {
        questionText.textContent = q;
        waitBox.style.display = 'none';
        questionText.style.display = 'block';
        if (!hasAnswered) {
          answerInput.disabled = false;
          submitBtn.disabled = false;
        }
      } else {
        questionText.style.display = 'none';
        waitBox.style.display = 'flex';
      }
    });

    onValue(ref(db, 'session/accepting'), snap => {
      if (!snap.val() && hasAnswered) {
        hasAnswered = false;
        answerInput.value = '';
        charCount.textContent = '0';
        answerInput.disabled = false;
        submitBtn.disabled = false;
        submitBtn.textContent = '回答を送る！ 🎯';
        hide(doneScreen); show(gameScreen);
      }
    });
  }

  // 回答送信
  submitBtn.addEventListener('click', async () => {
    const answer = answerInput.value.trim();
    if (!answer) { shakeEl(answerInput); return; }
    submitBtn.disabled = true;
    submitBtn.textContent = '送信中…';
    try {
      await push(ref(db, 'session/answers'), {
        name: playerName,
        answer: answer,
        timestamp: Date.now()
      });
      hasAnswered = true;
      doneNameSpan.textContent = playerName;
      hide(gameScreen); show(doneScreen);
    } catch(e) {
      alert("送信に失敗しました。もう一度試してください。");
      submitBtn.disabled = false;
      submitBtn.textContent = '回答を送る！ 🎯';
    }
  });

  answerInput.addEventListener('input', () => {
    charCount.textContent = answerInput.value.length;
  });

  function show(el) { el.classList.remove('hidden'); }
  function hide(el) { el.classList.add('hidden'); }
  function shakeEl(el) {
    el.classList.remove('shake');
    void el.offsetWidth;
    el.classList.add('shake');
    setTimeout(() => el.classList.remove('shake'), 500);
  }
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap');

:root {
  --yellow: #FFE600;
  --red:    #FF3B3B;
  --blue:   #0057FF;
  --green:  #00C853;
  --bg:     #1a0a2e;
  --radius: 16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'M PLUS Rounded 1c', sans-serif;
  background: var(--bg);
  min-height: 100dvh;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 39px, #ffffff08 40px),
    repeating-linear-gradient(90deg, transparent, transparent 39px, #ffffff08 40px);
  display: flex;
  flex-direction: column;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━
   ヘッダー（GMと同じ黒帯）
━━━━━━━━━━━━━━━━━━━━━━━━━━ */
header {
  background: #111;
  border-bottom: 4px solid var(--yellow);
  padding: 0 20px;
  height: 64px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: sticky;
  top: 0;
  z-index: 200;
  flex-shrink: 0;
}

.onair-lamp {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #2a0000;
  border: 2px solid var(--red);
  border-radius: 30px;
  padding: 6px 14px 6px 10px;
}
.lamp-dot {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--red);
  box-shadow: 0 0 10px var(--red), 0 0 20px #ff000066;
  animation: blink 1s infinite;
}
.lamp-text {
  font-family: 'Dela Gothic One', sans-serif;
  font-size: 13px;
  color: var(--red);
  letter-spacing: 2px;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }

/* ヘッダー中央タイトル（回答画面時のみ表示） */
.header-title {
  font-family: 'Dela Gothic One', sans-serif;
  line-height: 1.15;
}
/* TAPI TAPI → 小さく薄く（ロゴの logo-tapi と同じ） */
.header-title .ht-tapi {
  display: block;
  font-size: clamp(7px, 1.6vw, 10px);
  letter-spacing: 4px;
  color: #ffffff66;
  opacity: .8;
}
/* QUIZ SHOW → 大きく目立つ（ロゴの logo-main と同じ） */
.header-title .ht-show {
  display: block;
  font-size: clamp(13px, 3.2vw, 18px);
  color: var(--yellow);
  letter-spacing: 2px;
  text-shadow: 2px 2px 0 var(--red);
}
/* ログイン中はタイトルを隠す */
.header-title.login-hidden { visibility: hidden; }

/* ヘッダー右 プレイヤーバッジ */
.header-player {
  margin-left: auto;
  background: var(--yellow);
  border-radius: 30px;
  padding: 6px 16px;
  font-family: 'Dela Gothic One', sans-serif;
  font-size: 14px;
  color: #111;
  white-space: nowrap;
  max-width: 150px;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━
   メイン
━━━━━━━━━━━━━━━━━━━━━━━━━━ */
main {
  flex: 1;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 28px 16px 48px;
}

.screen {
  width: 100%;
  max-width: 480px;
  animation: popIn .38s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
.screen.hidden { display: none !important; }

@keyframes popIn {
  from { opacity: 0; transform: scale(0.88) translateY(18px); }
  to   { opacity: 1; transform: scale(1)    translateY(0); }
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━
   ① ログイン画面
━━━━━━━━━━━━━━━━━━━━━━━━━━ */

/* ── ロゴブロック（ログイン時のみ） ── */
.login-logo {
  text-align: center;
  margin-bottom: 20px;
  position: relative;
}

/* TVアイコン本体 */
.tv-wrap {
  position: relative;
  display: inline-block;
  margin-bottom: 4px;
}
.tv-icon {
  display: block;
  filter: drop-shadow(0 4px 6px #00000066) drop-shadow(0 0 20px #FFE60044);
  animation: tvFloat 3s ease-in-out infinite;
}
.tv-icon svg {
  display: block;
}
@keyframes tvFloat {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-8px); }
}

/* 蝶々たち */
.butterflies {
  position: absolute;
  inset: -28px;
  pointer-events: none;
}
.bf {
  position: absolute;
  width: var(--size, 28px);
  height: var(--size, 28px);
  animation: bfFly var(--d, 3s) ease-in-out infinite var(--delay, 0s);
  transform-origin: center;
  filter: drop-shadow(0 2px 4px #67e8f966);
}
.bf svg { width: 100%; height: 100%; }

/* 各蝶々の位置・サイズ・動き（8匹） */
.bf:nth-child(1){ top:-10px; left:5px;   --d:3.2s; --delay:0s;   --rx:16px;  --ry:-14px; --size:30px; }
.bf:nth-child(2){ top:5px;   right:-5px; --d:2.8s; --delay:.5s;  --rx:-18px; --ry:6px;   --size:24px; }
.bf:nth-child(3){ bottom:0;  left:-8px;  --d:3.6s; --delay:.9s;  --rx:14px;  --ry:16px;  --size:26px; }
.bf:nth-child(4){ bottom:2px;right:0px;  --d:2.5s; --delay:.2s;  --rx:-16px; --ry:14px;  --size:22px; }
.bf:nth-child(5){ top:28px;  left:-18px; --d:4.1s; --delay:1.3s; --rx:20px;  --ry:-8px;  --size:20px; }
.bf:nth-child(6){ top:18px;  right:-14px;--d:3.4s; --delay:.7s;  --rx:-14px; --ry:10px;  --size:18px; }
.bf:nth-child(7){ top:-14px; right:10px; --d:3.0s; --delay:1.1s; --rx:-10px; --ry:-16px; --size:22px; }
.bf:nth-child(8){ bottom:-4px;left:14px; --d:3.8s; --delay:.4s;  --rx:12px;  --ry:18px;  --size:20px; }

@keyframes bfFly {
  0%   { transform: translate(0,0)                                          rotate(0deg)   scale(1);    }
  20%  { transform: translate(calc(var(--rx)*.4), calc(var(--ry)*.4))       rotate(12deg)  scale(1.12); }
  45%  { transform: translate(var(--rx), var(--ry))                         rotate(-8deg)  scale(0.92); }
  70%  { transform: translate(calc(var(--rx)*.6), calc(var(--ry)*1.15))     rotate(18deg)  scale(1.06); }
  100% { transform: translate(0,0)                                          rotate(0deg)   scale(1);    }
}

/* 羽ばたきアニメ */
.bf svg .wing-l { transform-origin: 50% 50%; animation: flapL var(--d,3s) ease-in-out infinite var(--delay,0s); }
.bf svg .wing-r { transform-origin: 50% 50%; animation: flapR var(--d,3s) ease-in-out infinite var(--delay,0s); }
@keyframes flapL {
  0%,100% { transform: scaleX(1); }
  50%     { transform: scaleX(0.35); }
}
@keyframes flapR {
  0%,100% { transform: scaleX(1); }
  50%     { transform: scaleX(0.35); }
}

/* タイトルテキスト */
.logo-tapi {
  font-family: 'Dela Gothic One', sans-serif;
  font-size: clamp(10px, 3vw, 13px);
  color: var(--yellow);
  letter-spacing: 5px;
  opacity: .8;
  margin-bottom: 2px;
}
.logo-main {
  font-family: 'Dela Gothic One', sans-serif;
  font-size: clamp(22px, 7vw, 32px);
  color: var(--yellow);
  letter-spacing: 3px;
  text-shadow: 3px 3px 0 var(--red), 6px 6px 0 #11111166;
  line-height: 1;
}

/* ── ログインパネル ── */
.panel {
  background: var(--yellow);
  border-radius: var(--radius);
  padding: 22px 20px;
  margin-bottom: 16px;
  border: 3px solid #111;
  box-shadow: 6px 6px 0 #111;
  position: relative;
  overflow: hidden;
}
.panel::before {
  content: attr(data-deco);
  position: absolute;
  right: 14px; top: 50%;
  transform: translateY(-50%);
  font-size: 60px;
  opacity: .1;
  pointer-events: none;
}

.panel-label {
  font-family: 'Dela Gothic One', sans-serif;
  font-size: 11px;
  letter-spacing: 4px;
  background: #111;
  color: var(--yellow);
  display: inline-block;
  padding: 3px 12px;
  border-radius: 6px;
  margin-bottom: 14px;
}

.name-hint {
  font-size: 15px;
  font-weight: 900;
  color: #111;
  margin-bottom: 14px;
  line-height: 1.7;
}

input[type="text"] {
  width: 100%;
  background: #fff;
  border: 3px solid #111;
  border-radius: 10px;
  padding: 13px 16px;
  font-family: 'M PLUS Rounded 1c', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: #111;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
  -webkit-appearance: none;
}
input[type="text"]:focus { border-color: var(--blue); box-shadow: 3px 3px 0 var(--blue); }
input[type="text"]::placeholder { color: #bbb; font-weight: 400; }

.btn {
  font-family: 'Dela Gothic One', sans-serif;
  border: 3px solid #111;
  border-radius: 10px;
  padding: 13px 20px;
  font-size: 15px;
  cursor: pointer;
  transition: all .1s;
  letter-spacing: 1px;
  width: 100%;
  margin-top: 12px;
}
.btn:active  { transform: translate(4px,4px) !important; box-shadow: none !important; }
.btn:disabled{ opacity:.5; cursor:not-allowed; transform:none !important; }

.btn-join {
  background: var(--blue);
  color: #fff;
  box-shadow: 5px 5px 0 #111;
}
.btn-join:hover:not(:disabled) { box-shadow: 7px 7px 0 #111; transform: translate(-1px,-1px); }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━
   ② 回答入力画面
━━━━━━━━━━━━━━━━━━━━━━━━━━ */

/* GMと同じテロップバー */
.telop-bar {
  background: #111;
  border-radius: var(--radius);
  padding: 14px 20px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  border: 3px solid #333;
  min-height: 64px;
  position: relative;
  overflow: hidden;
}
.telop-label {
  font-family: 'Dela Gothic One', sans-serif;
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--yellow);
  background: var(--red);
  padding: 4px 10px;
  border-radius: 6px;
  white-space: nowrap;
  flex-shrink: 0;
}
#questionText {
  font-size: 18px;
  font-weight: 900;
  color: #fff;
  line-height: 1.5;
  display: none;
}

#waitBox {
  display: flex;
  align-items: center;
  gap: 10px;
}
.wait-dots { display: flex; gap: 5px; }
.wait-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #555;
  animation: dotPulse 1.2s infinite;
}
.wait-dot:nth-child(2) { animation-delay:.2s; }
.wait-dot:nth-child(3) { animation-delay:.4s; }
@keyframes dotPulse { 0%,100%{opacity:.3;transform:scale(.8)} 50%{opacity:1;transform:scale(1.2)} }
.wait-text {
  font-family: 'Dela Gothic One', sans-serif;
  font-size: 12px; color: #555; letter-spacing: 3px;
}

/* 回答入力パネル */
.panel-answer { background: var(--yellow); }

textarea {
  width: 100%;
  background: #fff;
  border: 3px solid #111;
  border-radius: 10px;
  padding: 13px 16px;
  font-family: 'M PLUS Rounded 1c', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: #111;
  outline: none;
  resize: none;
  min-height: 120px;
  line-height: 1.7;
  -webkit-appearance: none;
  transition: border-color .15s, box-shadow .15s;
}
textarea:focus   { border-color: var(--blue); box-shadow: 3px 3px 0 var(--blue); }
textarea::placeholder { color: #bbb; font-weight: 400; }
textarea:disabled{ opacity:.5; }

.char-row {
  display: flex;
  justify-content: flex-end;
  font-size: 12px;
  color: #55555599;
  margin-top: 6px;
  font-weight: 700;
}
#charCount { color: var(--blue); }

.btn-submit {
  background: var(--green);
  color: #fff;
  box-shadow: 5px 5px 0 #111;
}
.btn-submit:hover:not(:disabled) { box-shadow: 7px 7px 0 #111; transform: translate(-1px,-1px); }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━
   ③ 送信完了画面（タピオカアニメ）
━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.done-panel {
  background: #111;
  border-radius: var(--radius);
  border: 3px solid var(--green);
  box-shadow: 6px 6px 0 var(--green);
  padding: 36px 24px 40px;
  text-align: center;
}

/* タピオカカップSVGラッパー */
.boba-wrap {
  width: 120px;
  height: 150px;
  margin: 0 auto 20px;
  animation: bobaAppear .4s cubic-bezier(0.34,1.56,0.64,1) both,
             bobaTilt 0.5s ease-in-out 1.8s both;
}
@keyframes bobaAppear {
  from { transform: scale(0) rotate(-15deg); opacity: 0; }
  to   { transform: scale(1) rotate(0deg);   opacity: 1; }
}
/* 注ぎ終わったらカランと揺れる */
@keyframes bobaTilt {
  0%   { transform: rotate(0deg); }
  25%  { transform: rotate(-12deg); }
  50%  { transform: rotate(10deg); }
  70%  { transform: rotate(-6deg); }
  85%  { transform: rotate(4deg); }
  100% { transform: rotate(0deg); }
}

/* 液体が下から上へ満たされる */
.boba-liquid {
  animation: fillUp 1.4s cubic-bezier(0.4,0,0.2,1) 0.3s both;
}
@keyframes fillUp {
  from { transform: scaleY(0); transform-origin: bottom; }
  to   { transform: scaleY(1); transform-origin: bottom; }
}

/* タピオカの粒がポコポコ現れる */
.boba-pearl {
  opacity: 0;
  animation: pearlPop 0.3s ease-out both;
}
.boba-pearl:nth-child(1) { animation-delay: 0.6s; }
.boba-pearl:nth-child(2) { animation-delay: 0.8s; }
.boba-pearl:nth-child(3) { animation-delay: 1.0s; }
.boba-pearl:nth-child(4) { animation-delay: 0.7s; }
.boba-pearl:nth-child(5) { animation-delay: 0.9s; }
@keyframes pearlPop {
  0%   { transform: scale(0); opacity: 0; }
  70%  { transform: scale(1.2); opacity: 1; }
  100% { transform: scale(1);   opacity: 1; }
}

/* ストローがスッと伸びる */
.boba-straw {
  transform-origin: bottom center;
  animation: strawIn 0.4s cubic-bezier(0.34,1.56,0.64,1) 1.5s both;
}
@keyframes strawIn {
  from { transform: scaleY(0); opacity: 0; }
  to   { transform: scaleY(1); opacity: 1; }
}

.done-title {
  font-family: 'Dela Gothic One', sans-serif;
  font-size: 24px;
  color: var(--yellow);
  letter-spacing: 3px;
  text-shadow: 3px 3px 0 var(--red);
  margin-bottom: 14px;
}
.done-name-telop {
  display: inline-block;
  font-family: 'Dela Gothic One', sans-serif;
  font-size: 15px;
  letter-spacing: 2px;
  color: var(--yellow);
  background: var(--red);
  padding: 5px 18px;
  border-radius: 8px;
  margin-bottom: 16px;
}
.done-sub {
  font-size: 14px;
  font-weight: 700;
  color: #aaa;
  line-height: 1.9;
}

/* ━━━ 共通 ━━━ */
#toast {
  position: fixed;
  bottom: 30px; left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: #111;
  color: var(--yellow);
  font-family: 'Dela Gothic One', sans-serif;
  font-size: 15px;
  padding: 14px 28px;
  border-radius: 40px;
  border: 3px solid var(--yellow);
  box-shadow: 4px 4px 0 var(--yellow);
  transition: transform .3s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 999;
  white-space: nowrap;
  letter-spacing: 2px;
}
#toast.show { transform: translateX(-50%) translateY(0); }

.shake { animation: shake .4s ease; }
@keyframes shake {
  0%,100%{ transform:translateX(0) }
  25%    { transform:translateX(-8px) }
  75%    { transform:translateX(8px) }
}
</style>
